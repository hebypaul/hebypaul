name: GitHub Metrics

on:
  schedule:
    - cron: "0 2 * * *"   # Runs daily at 2 AM
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Lines of Code Metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Output SVG
          filename: github-metrics.svg

          # Disable default dashboard
          base: ""

          # Focus only on your own repositories
          repositories_affiliations: owner
          repositories_forks: no

          # Lines of Code plugin
          plugin_lines: yes
          plugin_lines_sections: base

          # Reduce API usage
          plugin_lines_repositories_limit: 3
          plugin_lines_history_limit: 1
          plugin_lines_delay: 2

          # Skip irrelevant repositories if needed
          plugin_lines_skipped: |
            hebypaul/hebypaul

          # Timezone
          config_timezone: Asia/Kolkata

          # Reduce rendering overhead
          config_animations: no
