name: GitHub Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Lines of Code Metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          filename: github-metrics.svg

          # Minimal base section required for rendering
          base: header

          # Restrict repository scope
          repositories_affiliations: owner
          repositories_forks: no

          # Lines of code plugin
          plugin_lines: yes
          plugin_lines_sections: base

          # Rate-limit protection
          plugin_lines_repositories_limit: 3
          plugin_lines_history_limit: 1
          plugin_lines_delay: 2

          config_timezone: Asia/Kolkata
          config_animations: no
