name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          base: ""
          plugin_lines: yes
          plugin_lines_sections: base

          plugin_lines_ignored: |
            package.json
            package-lock.json
            dist/*
            .next/*
            vendor/*
